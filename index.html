<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f16"/>
  <title>RoadCheck IRI Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0f16;
      --bg-card: rgba(18, 25, 35, 0.85);
      --bg-panel: rgba(25, 33, 46, 0.7);
      --accent-primary: #f59e0b;
      --accent-secondary: #3b82f6;
      --accent-danger: #ef4444;
      --accent-success: #10b981;
      --accent-warning: #f97316;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --border-glass: rgba(255,255,255,0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1a2332 0%, var(--bg-deep) 70%);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      overflow: hidden;
      padding: 8px;
    }

    .app-container {
      width: 100%;
      max-width: 460px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: 28px;
      padding: 12px 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .app-title {
      font-size: 1.1rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-warning));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .vehicle-indicator {
      font-size: 0.6rem;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 12px;
      cursor: pointer;
    }
    .install-btn {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-glass);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      display: none;
    }
    .install-btn.show { display: block; }

    .nav-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
      background: rgba(0,0,0,0.2);
      border-radius: 14px;
      padding: 3px;
    }
    .nav-tab {
      flex: 1;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      padding: 8px 4px;
      border-radius: 10px;
      font-size: 0.65rem;
      cursor: pointer;
      font-weight: 600;
    }
    .nav-tab.active {
      background: var(--accent-primary);
      color: #0a0f16;
      box-shadow: 0 4px 10px rgba(245,158,11,0.3);
    }

    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 6px; }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .metric-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 14px;
      padding: 8px;
      text-align: center;
    }
    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .metric-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }

    .map-container {
      height: 160px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border-glass);
      background: #0f172a;
      flex-shrink: 0;
    }
    #mapMeasure, #mapGlobal, #mapFullscreen { height: 100%; width: 100%; }

    .chart-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 18px;
      padding: 8px;
      height: 130px;
      flex-shrink: 0;
    }
    .chart-panel canvas { width: 100%!important; height: 100%!important; }

    .btn {
      padding: 10px 12px;
      border-radius: 22px;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      min-width: 60px;
      transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-warning)); color: #0a0f16; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border-glass); }
    .btn-accent { background: var(--accent-secondary); color: white; }
    .btn-danger { background: var(--accent-danger); color: white; }
    .btn-success { background: var(--accent-success); color: white; }
    .btn-sm { padding: 6px 10px; font-size: 0.7rem; }

    .segment-control {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-panel);
      border-radius: 14px;
      padding: 6px 12px;
      border: 1px solid var(--border-glass);
    }
    .segment-control input[type=range] { flex: 1; accent-color: var(--accent-primary); }

    .controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 14px;
      padding: 10px;
    }
    .hidden { display: none !important; }

    .list-container { max-height: 200px; overflow-y: auto; }
    .list-item {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .list-item.active { border-color: var(--accent-primary); background: rgba(245,158,11,0.1); }

    .custom-checkbox { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; }
    .custom-checkbox input { accent-color: var(--accent-primary); width: 16px; height: 16px; }

    .modal-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      display:flex; justify-content:center; align-items:center; z-index:2000;
    }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: 24px;
      padding: 18px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .text-muted { color: var(--text-secondary); font-size: 0.7rem; }

    @media (max-width: 400px) {
      .metric-value { font-size: 1.1rem; }
      .btn { padding: 8px 10px; font-size: 0.7rem; }
      .map-container { height: 130px; }
      .chart-panel { height: 110px; }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="app-container" id="main-app">
    <div class="app-header">
      <div class="app-title">🛣️ RoadCheck IRI Pro</div>
      <span class="vehicle-indicator" id="headerVehicle" onclick="switchTab('garage')">🚗 Sin vehículo</span>
      <button id="installButton" class="install-btn" onclick="installPWA()"><i class="fas fa-download"></i> Instalar</button>
    </div>
    
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('measure')">📏 Medir</button>
      <button class="nav-tab" onclick="switchTab('garage')">🚗 Garaje</button>
      <button class="nav-tab" onclick="switchTab('history')">📋 Historial</button>
      <button class="nav-tab" onclick="switchTab('globalMap')">🗺️ Visor</button>
    </div>

    <!-- MEDICIÓN -->
    <div id="tab-measure" class="tab-content active">
      <div class="metrics-grid">
        <div class="metric-card iri-measured"><div class="metric-label">IRI Medido</div><div class="metric-value" id="iriMeasured">---</div></div>
        <div class="metric-card iri-corrected"><div class="metric-label">IRI Corregido</div><div class="metric-value" id="iriCorrected">---</div></div>
        <div class="metric-card speed-card"><div class="metric-label">Velocidad</div><div class="metric-value" id="speedValue">---</div></div>
        <div class="metric-card distance-card"><div class="metric-label">Distancia</div><div class="metric-value" id="distanceValue">0 m</div></div>
      </div>
      <div id="qualityIndicator" class="panel hidden" style="text-align:center; font-weight:600; font-size:0.8rem; padding:6px;"></div>
      <div class="map-container" id="measMapContainer"><div id="mapMeasure"></div></div>
      <div class="chart-panel"><canvas id="sensorChart"></canvas></div>
      <div class="segment-control">
        <span style="font-size:0.7rem;">Tramo:</span>
        <input type="range" id="segmentLength" min="5" max="200" value="100" step="5" oninput="updateSegmentLabel()">
        <span id="segmentLengthLabel" style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;min-width:40px;">100 m</span>
      </div>
      <div class="controls">
        <button id="btnStart" class="btn btn-primary" onclick="startMeasurement()"><i class="fas fa-play"></i> Iniciar</button>
        <div id="pauseStopControls" class="hidden" style="display:flex;gap:6px;width:100%;">
          <button class="btn btn-accent" onclick="pauseMeasurement()"><i class="fas fa-pause"></i> Pausa</button>
          <button class="btn btn-danger" onclick="stopMeasurement()"><i class="fas fa-stop"></i> Finalizar</button>
        </div>
        <button id="btnResume" class="btn btn-primary hidden" onclick="resumeMeasurement()"><i class="fas fa-play"></i> Reanudar</button>
      </div>
      <div class="controls">
        <button class="btn btn-secondary" onclick="calibratePhonePosition()"><i class="fas fa-mobile-alt"></i> Calibrar</button>
        <button class="btn btn-secondary" onclick="showSettings()"><i class="fas fa-cog"></i> Ajustes</button>
      </div>
      <div id="calibrationStatus" class="panel hidden" style="text-align:center; font-size:0.75rem; padding:6px;">
        <span id="calStatusText">Calibrando...</span>
      </div>
    </div>

    <!-- GARAJE -->
    <div id="tab-garage" class="tab-content">
      <button class="btn btn-secondary" onclick="showAddVehicleModal()" style="margin-bottom:8px;width:100%;"><i class="fas fa-plus"></i> Añadir coche</button>
      <div id="garageList" class="list-container"></div>
    </div>

    <!-- HISTORIAL -->
    <div id="tab-history" class="tab-content">
      <div class="controls" style="margin-bottom:6px;">
        <button class="btn btn-secondary" onclick="loadHistory()"><i class="fas fa-sync"></i></button>
        <button class="btn btn-danger" onclick="clearAllHistory()"><i class="fas fa-trash"></i></button>
      </div>
      <div id="historyList" class="list-container"><p class="text-muted" style="text-align:center;">Sin rutas</p></div>
    </div>

    <!-- VISOR GLOBAL -->
    <div id="tab-globalMap" class="tab-content">
      <div class="panel">
        <h4 style="font-size:0.8rem;margin-bottom:4px;">Rutas activas</h4>
        <div id="routeCheckboxes"></div>
        <div style="display:flex; gap:4px; margin-top:6px;">
          <button class="btn btn-sm btn-secondary" onclick="toggleAllRoutes(true)">Todas</button>
          <button class="btn btn-sm btn-secondary" onclick="toggleAllRoutes(false)">Ninguna</button>
          <button id="avgToggleBtn" class="btn btn-sm btn-secondary" onclick="toggleAverageOverlaps()">Promediar</button>
          <button class="btn btn-sm btn-secondary" onclick="refreshGlobalMap()">Refrescar</button>
        </div>
      </div>
      <div class="map-container" style="height:180px;"><div id="mapGlobal"></div></div>
      <select id="globalViewMode" onchange="updateGlobalMap()" style="margin-top:4px;width:100%;padding:8px;border-radius:12px;background:var(--bg-panel);border:1px solid var(--border-glass);color:var(--text-primary);font-size:0.75rem;">
        <option value="iri_measured">IRI Medido</option>
        <option value="iri_corrected" selected>IRI Corregido</option>
        <option value="average">Promedio</option>
      </select>
      <div id="segmentInfo" class="panel hidden" style="margin-top:6px;"><div id="segmentDetails"></div></div>
    </div>

    <!-- Modales -->
    <div id="routeModal" class="modal-overlay hidden">
      <div class="modal-box">
        <h3 id="routeModalTitle" style="margin-bottom:8px;"></h3>
        <p><strong>Fecha:</strong> <span id="routeDate"></span></p>
        <p><strong>Distancia:</strong> <span id="routeDistance"></span></p>
        <p><strong>IRI Med. Prom:</strong> <span id="routeIRIMeasuredAvg"></span></p>
        <p><strong>IRI Corr. Prom:</strong> <span id="routeIRICorrectedAvg"></span></p>
        <div id="routeSegmentList" style="max-height:120px;overflow-y:auto;margin:8px 0;"></div>
        <div class="controls" style="flex-wrap:wrap;"></div>
      </div>
    </div>
    <div id="addVehicleModal" class="modal-overlay hidden">
      <div class="modal-box">
        <h3>Añadir vehículo</h3>
        <input type="text" id="vehicleName" placeholder="Marca y modelo" style="width:100%;padding:8px;margin:6px 0;background:var(--bg-panel);border:1px solid var(--border-glass);border-radius:10px;color:white;">
        <label>Coef. a: <span id="vehicleCoefAVal">2.00</span></label><input type="range" id="vehicleCoefA" min="0.5" max="5.0" step="0.05" value="2.0">
        <label>Coef. b: <span id="vehicleCoefBVal">0.50</span></label><input type="range" id="vehicleCoefB" min="0.0" max="3.0" step="0.05" value="0.5">
        <div class="controls" style="margin-top:8px;"><button class="btn btn-primary" id="btnSaveVehicle">Guardar</button><button class="btn btn-secondary" onclick="closeVehicleModal()">Cancelar</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
  <script>
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); window.deferredPrompt = e; document.getElementById('installButton').classList.add('show'); });
    function installPWA() { if(window.deferredPrompt){ window.deferredPrompt.prompt(); window.deferredPrompt.userChoice.then(()=>{ document.getElementById('installButton').classList.remove('show'); window.deferredPrompt=null; }); } }
    document.getElementById('routeModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
    document.getElementById('addVehicleModal').addEventListener('click', function(e){ if(e.target===this) closeVehicleModal(); });
  </script>
</body>
</html>
